<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f9f9f9 0%, white 100%);
    }
    .error-container {
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 120px;
      color: #1A6BC5;
      margin-bottom: 10px;
    }
    h2 {
      font-size: 32px;
      color: #333;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      color: #666;
      margin-bottom: 30px;
    }
    a {
      display: inline-block;
      padding: 12px 30px;
      background: #1A6BC5;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin: 10px;
    }
    a:hover {
      background: #0C447C;
    }
  </style>
</head>
<body>

<div class="error-container">
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>Sorry, we couldn't find the page you're looking for.</p>
  <a href="/">Back to Home</a>
</div>

</body>
</html>
